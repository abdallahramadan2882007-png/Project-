<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Course - ABDULLAH RAMADAN</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>ABDULLAH RAMADAN</h1>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="courses.html">My Courses</a></li>
                <li><a href="add-course.html">Add Course</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="glass-card">
            <h2>Add Course</h2>
            <div class="form-group">
                <label>Course Name</label>
                <input type="text" placeholder="Enter course name">
            </div>
            <div class="form-group">
                <label>Instructor</label>
                <input type="text" placeholder="Enter instructor name">
            </div>
            <div class="form-group">
                <label>Schedule</label>
                <input type="text" placeholder="e.g. Sun & Tue - 10:00 AM">
            </div>
            <div class="form-group">
                <label>Credit Hours</label>
                <input type="text" placeholder="Enter credit hours">
            </div>
            <div class="form-group">
                <label>Notes</label>
                <textarea rows="3" placeholder="Any additional notes..."></textarea>
            </div>
            <button>Add Course</button>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 ABDULLAH RAMADAN - ALL RIGHTS RESERVED</p>
    </footer>
</body>
</html>
